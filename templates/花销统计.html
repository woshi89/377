<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花销统计 - 我的骑行日记</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary-green: #2d5a3d;
            --secondary-green: #4a7c59;
            --light-green: #e8f5ec;
            --white: #ffffff;
            --text-gray: #666666;
            --text-dark: #333333;
            --mint-green: #a5d6a7;
            --orange: #f57c00;
            --bg-gradient: linear-gradient(135deg, #2d5a3d 0%, #4a7c59 50%, #6bb37e 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            color: var(--white);
        }

        .back-btn {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.2);
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .back-btn i { margin-right: 6px; }

        .header-title { font-size: 1.3rem; font-weight: 600; }

        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(45,90,61,0.15);
        }

        .date-tabs {
            display: flex;
            background: var(--light-green);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .date-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-gray);
            transition: all 0.3s ease;
        }

        .date-tab.active {
            background: var(--primary-green);
            color: var(--white);
        }

        .date-tab:hover:not(.active) {
            background: rgba(45,90,61,0.1);
        }

        .date-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .date-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--light-green);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: var(--primary-green);
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .date-btn:hover {
            background: var(--primary-green);
            color: var(--white);
        }

        .current-date {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-item {
            background: var(--light-green);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .summary-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--orange);
            margin-bottom: 4px;
        }

        .summary-label {
            font-size: 0.8rem;
            color: var(--text-gray);
        }

        .chart-container {
            margin-bottom: 20px;
            background: var(--light-green);
            border-radius: 12px;
            padding: 15px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .data-table th {
            background: var(--light-green);
            color: var(--primary-green);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover { background: rgba(45,90,61,0.05); }

        .expense-value {
            font-weight: 600;
            color: var(--orange);
        }

        .expense-category {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            color: var(--white);
        }

        .category-装备 { background: #4a7c59; }
        .category-餐饮 { background: #f57c00; }
        .category-交通 { background: #1976d2; }
        .category-其他 { background: #757575; }

        /* 花销记录列表 */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary-green);
            display: flex;
            align-items: center;
        }

        .section-title i { margin-right: 8px; }

        .add-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: linear-gradient(135deg, #f57c00, #ff9800);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-btn:hover { box-shadow: 0 4px 15px rgba(245,124,0,0.4); }

        .expense-record-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: var(--light-green);
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .expense-record-item:hover {
            background: var(--mint-green);
            transform: translateX(4px);
        }

        .record-main {
            flex: 1;
            min-width: 0;
        }

        .record-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .record-amount {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--orange);
        }

        .record-meta {
            font-size: 0.8rem;
            color: var(--text-gray);
        }

        .record-desc {
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .record-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .record-action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .record-action-btn.edit {
            background: rgba(74,124,89,0.15);
            color: var(--secondary-green);
        }

        .record-action-btn.edit:hover {
            background: var(--secondary-green);
            color: white;
        }

        .record-action-btn.delete {
            background: rgba(244,67,54,0.12);
            color: #f44336;
        }

        .record-action-btn.delete:hover {
            background: #f44336;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-gray);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--white);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--light-green);
            color: var(--text-gray);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: #f44336;
            color: white;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-dark);
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--orange);
            background: var(--white);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.cancel {
            background: var(--light-green);
            color: var(--text-gray);
        }

        .modal-btn.cancel:hover { background: #d5e8da; }

        .modal-btn.confirm {
            background: linear-gradient(135deg, #f57c00, #ff9800);
            color: white;
        }

        .modal-btn.confirm:hover { box-shadow: 0 4px 15px rgba(245,124,0,0.4); }

        .modal-btn.danger {
            background: #f44336;
            color: white;
        }

        .modal-btn.danger:hover { background: #d32f2f; }

        /* 底部导航 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; background: var(--white);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(45,90,61,0.12);
            padding: 8px 15px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            z-index: 100;
            justify-content: space-around;
        }

        .nav-item {
            flex: 1; max-width: 90px;
            display: flex; flex-direction: column;
            align-items: center; padding: 10px 8px;
            border-radius: 14px; cursor: pointer;
            color: var(--text-gray); transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            position: relative;
        }

        .nav-item:hover {
            background: rgba(74,124,89,0.08);
            color: var(--secondary-green);
            transform: translateY(-2px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(45,90,61,0.15), rgba(74,124,89,0.1));
            color: var(--primary-green);
            box-shadow: 0 4px 12px rgba(45,90,61,0.15);
        }

        .nav-item.active::before {
            content: ''; position: absolute; top: -4px;
            width: 6px; height: 6px; background: var(--primary-green);
            border-radius: 50%; animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(45,90,61,0.4); }
            50% { box-shadow: 0 0 0 6px rgba(45,90,61,0); }
        }

        .nav-item i { font-size: 1.4rem; margin-bottom: 5px; transition: transform 0.3s ease; }
        .nav-item:hover i, .nav-item.active i { transform: scale(1.1); }
        .nav-item span { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.3px; }

        @media (min-width: 768px) {
            body { max-width: 800px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
            <span>返回</span>
        </div>
        <div class="header-title">花销统计</div>
        <div style="width: 80px;"></div>
    </div>

    <!-- 图表卡片 -->
    <div class="card">
        <div class="date-tabs">
            <div class="date-tab active" id="day-tab" onclick="switchView('day')">日</div>
            <div class="date-tab" id="month-tab" onclick="switchView('month')">月</div>
            <div class="date-tab" id="year-tab" onclick="switchView('year')">年</div>
        </div>

        <div class="date-selector">
            <button class="date-btn" id="prev-btn" onclick="changeDate(-1)">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="current-date" id="current-date">2026年5月</div>
            <button class="date-btn" id="next-btn" onclick="changeDate(1)">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <div class="summary-grid">
            <div class="summary-item">
                <div class="summary-value" id="total-expense">¥0</div>
                <div class="summary-label">总花销</div>
            </div>
            <div class="summary-item">
                <div class="summary-value" id="expense-count">0</div>
                <div class="summary-label">消费次数</div>
            </div>
            <div class="summary-item">
                <div class="summary-value" id="avg-expense">¥0</div>
                <div class="summary-label">平均消费</div>
            </div>
        </div>

        <div class="chart-container">
            <div id="expense-chart" style="width: 100%; height: 300px;"></div>
        </div>

        <div style="overflow-x: auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>金额</th>
                        <th>分类</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody id="data-body"></tbody>
            </table>
        </div>
    </div>

    <!-- 花销记录管理 -->
    <div class="card">
        <div class="section-header">
            <h2 class="section-title">
                <i class="fas fa-receipt"></i>
                花销记录
            </h2>
            <button class="add-btn" onclick="openAddModal()">
                <i class="fas fa-plus"></i>
                <span>添加记录</span>
            </button>
        </div>
        <div id="expense-records-list">
            <div class="empty-state">加载中...</div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
      <div class="nav-item" onclick="goBack()">
        <i class="fa-solid fa-bicycle"></i>
        <span>骑行</span>
      </div>
      <div class="nav-item active">
        <i class="fa-solid fa-user"></i>
        <span>我</span>
      </div>
    </div>

    <!-- 添加/编辑模态框 -->
    <div class="modal-overlay" id="add-edit-modal" onclick="closeModal('add-edit-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">添加花销记录</h3>
                <button class="modal-close" onclick="closeModal('add-edit-modal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <input type="hidden" id="expense-id">
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="expense-date" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>金额 (¥)</label>
                    <input type="number" id="expense-amount" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="expense-category" required>
                        <option value="装备">装备</option>
                        <option value="餐饮">餐饮</option>
                        <option value="交通">交通</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="expense-description" placeholder="添加备注..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal('add-edit-modal')">取消</button>
                <button class="modal-btn confirm" onclick="saveExpense()">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal-overlay" id="delete-confirm-modal" onclick="closeModal('delete-confirm-modal')">
        <div class="modal" style="text-align:center;" onclick="event.stopPropagation()">
            <div style="font-size:2rem;margin-bottom:10px;color:#f44336;">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3 class="modal-title">确认删除</h3>
            <p style="color:var(--text-gray);margin:10px 0 20px;">确定要删除 <strong id="delete-expense-info"></strong> 吗？此操作不可撤销。</p>
            <input type="hidden" id="delete-expense-id">
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal('delete-confirm-modal')">取消</button>
                <button class="modal-btn danger" onclick="deleteExpense()">删除</button>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        let currentView = 'day';
        let currentDate = new Date();
        let chartInstance = null;
        let expenseRecords = [];

        function goBack() { window.location.href = '/'; }
        function goToStats() { window.location.href = '/ride-stats'; }
        function goToEquipment() { window.location.href = '/equipment'; }

        // ===== 图表逻辑 =====
        function initChart() {
            chartInstance = echarts.init(document.getElementById('expense-chart'));
        }

        function formatMonth(date) {
            return `${date.getFullYear()}年${date.getMonth() + 1}月`;
        }

        function formatYear(date) {
            return `${date.getFullYear()}年`;
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.date-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`${view}-tab`).classList.add('active');
            updateDateDisplay();
            loadChartData();
            loadExpenseRecords();
        }

        function changeDate(direction) {
            if (currentView === 'day') {
                currentDate.setMonth(currentDate.getMonth() + direction);
            } else if (currentView === 'month') {
                currentDate.setMonth(currentDate.getMonth() + direction);
            } else {
                currentDate.setFullYear(currentDate.getFullYear() + direction);
            }
            updateDateDisplay();
            loadChartData();
            loadExpenseRecords();
        }

        function updateDateDisplay() {
            let display = '';
            if (currentView === 'day' || currentView === 'month') {
                display = formatMonth(currentDate);
            } else {
                display = formatYear(currentDate);
            }
            document.getElementById('current-date').textContent = display;
        }

        function loadChartData() {
            fetch(`/api/expense_stats/${currentView}`)
                .then(res => res.json())
                .then(data => {
                    renderChart(data.labels, data.values);
                    renderTable(data.labels, data.values);
                    updateSummary(data.values);
                })
                .catch(err => console.error('加载图表数据失败', err));
        }

        function renderChart(labels, values) {
            if (!chartInstance) return;
            chartInstance.setOption({
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(255,255,255,0.95)',
                    borderColor: '#f57c00',
                    borderWidth: 1,
                    textStyle: { color: '#333' },
                    formatter: function(params) {
                        return `${params[0].name}<br/>花销: <strong>¥${params[0].value}</strong>`;
                    }
                },
                grid: { left: '10%', right: '10%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: labels,
                    axisLine: { lineStyle: { color: '#ddd' } },
                    axisLabel: { color: '#666', fontSize: 12 }
                },
                yAxis: {
                    type: 'value',
                    name: '金额 (¥)',
                    nameTextStyle: { color: '#666', fontSize: 12 },
                    axisLine: { show: false },
                    axisTick: { show: false },
                    splitLine: { lineStyle: { color: '#eee', type: 'dashed' } },
                    axisLabel: { color: '#666', fontSize: 12 }
                },
                series: [{
                    name: '花销',
                    type: 'line',
                    smooth: true,
                    data: values,
                    symbol: 'circle',
                    symbolSize: 8,
                    lineStyle: { color: '#f57c00', width: 3 },
                    itemStyle: { color: '#f57c00', borderWidth: 2, borderColor: '#fff' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(245,124,0,0.3)' },
                            { offset: 1, color: 'rgba(245,124,0,0.05)' }
                        ])
                    }
                }]
            });
        }

        function renderTable(labels, values) {
            const body = document.getElementById('data-body');
            body.innerHTML = labels.map((label, i) => {
                const val = values[i] || 0;
                return `
                    <tr>
                        <td>${escapeHtml(String(label))}</td>
                        <td class="expense-value">¥${val}</td>
                        <td>-</td>
                        <td>-</td>
                    </tr>
                `;
            }).join('');
        }

        function updateSummary(values) {
            const total = values.reduce((a, b) => a + b, 0);
            const count = values.filter(v => v > 0).length;
            const avg = count > 0 ? Math.round(total / count) : 0;
            document.getElementById('total-expense').textContent = `¥${total}`;
            document.getElementById('expense-count').textContent = count;
            document.getElementById('avg-expense').textContent = `¥${avg}`;
        }

        // ===== 花销记录 CRUD =====
        function loadExpenseRecords() {
            fetch('/api/expenses')
                .then(res => res.json())
                .then(data => {
                    expenseRecords = data;
                    renderExpenseRecords();
                })
                .catch(() => {
                    document.getElementById('expense-records-list').innerHTML = '<div class="empty-state">加载失败</div>';
                });
        }

        function renderExpenseRecords() {
            const list = document.getElementById('expense-records-list');
            if (expenseRecords.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无花销记录，点击上方按钮添加</div>';
                return;
            }
            list.innerHTML = expenseRecords.map(record => `
                <div class="expense-record-item">
                    <div class="record-main">
                        <div class="record-top">
                            <span class="record-amount">¥${record.amount}</span>
                            <span class="expense-category category-${escapeHtml(record.category)}">${escapeHtml(record.category)}</span>
                            <span class="record-meta">${escapeHtml(record.date)}</span>
                        </div>
                        ${record.description ? `<div class="record-desc">${escapeHtml(record.description)}</div>` : ''}
                    </div>
                    <div class="record-actions">
                        <button class="record-action-btn edit" onclick="openEditModal(${record.id})" title="编辑">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="record-action-btn delete" onclick="openDeleteConfirm(${record.id})" title="删除">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openAddModal() {
            document.getElementById('modal-title').textContent = '添加花销记录';
            document.getElementById('expense-id').value = '';
            document.getElementById('expense-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('expense-amount').value = '';
            document.getElementById('expense-category').value = '装备';
            document.getElementById('expense-description').value = '';
            document.getElementById('add-edit-modal').classList.add('show');
        }

        function openEditModal(id) {
            const record = expenseRecords.find(r => r.id === id);
            if (!record) return;
            document.getElementById('modal-title').textContent = '编辑花销记录';
            document.getElementById('expense-id').value = record.id;
            document.getElementById('expense-date').value = record.date;
            document.getElementById('expense-amount').value = record.amount;
            document.getElementById('expense-category').value = record.category;
            document.getElementById('expense-description').value = record.description || '';
            document.getElementById('add-edit-modal').classList.add('show');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function saveExpense() {
            const id = document.getElementById('expense-id').value;
            const date = document.getElementById('expense-date').value;
            const amount = parseFloat(document.getElementById('expense-amount').value);
            const category = document.getElementById('expense-category').value;
            const description = document.getElementById('expense-description').value;

            if (!date || isNaN(amount) || !category) {
                showToast('请填写完整信息');
                return;
            }

            const payload = { date, amount, category, description };
            const url = id ? `/api/expense_record/${id}` : '/api/expense_record';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                credentials: 'include'
            })
            .then(res => res.json())
            .then(() => {
                showToast(id ? '修改成功' : '添加成功');
                closeModal('add-edit-modal');
                loadExpenseRecords();
                loadChartData();
            })
            .catch(() => showToast('操作失败'));
        }

        function openDeleteConfirm(id) {
            const record = expenseRecords.find(r => r.id === id);
            if (!record) return;
            document.getElementById('delete-expense-id').value = id;
            document.getElementById('delete-expense-info').textContent = `${record.date} - ¥${record.amount} (${record.category})`;
            document.getElementById('delete-confirm-modal').classList.add('show');
        }

        function deleteExpense() {
            const id = document.getElementById('delete-expense-id').value;
            fetch(`/api/expense_record/${id}`, { method: 'DELETE', credentials: 'include' })
            .then(res => res.json())
            .then(() => {
                showToast('删除成功');
                closeModal('delete-confirm-modal');
                loadExpenseRecords();
                loadChartData();
            })
            .catch(() => showToast('删除失败'));
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
                background: rgba(45,90,61,0.9); color: white;
                padding: 12px 24px; border-radius: 10px;
                font-weight: 600; z-index: 2000;
                opacity: 0; transition: opacity 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '1', 10);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => document.body.removeChild(toast), 300);
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            updateDateDisplay();
            loadChartData();
            loadExpenseRecords();
            window.addEventListener('resize', () => {
                if (chartInstance) chartInstance.resize();
            });
        });
    </script>
</body>
</html>
