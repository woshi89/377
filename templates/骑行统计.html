<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骑行统计 - 我的骑行日记</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2d5a3d;
            --secondary-green: #4a7c59;
            --light-green: #e8f5ec;
            --white: #ffffff;
            --text-gray: #666666;
            --text-dark: #333333;
            --mint-green: #a5d6a7;
            --bg-gradient: linear-gradient(135deg, #2d5a3d 0%, #4a7c59 50%, #6bb37e 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            color: var(--white);
        }

        .back-btn {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.2);
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
        }

        .back-btn:hover { background: rgba(255,255,255,0.3); }

        .back-btn i { margin-right: 6px; }

        .header-title { font-size: 1.3rem; font-weight: 600; }

        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(45,90,61,0.15);
        }

        .tabs {
            display: flex;
            background: var(--light-green);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-gray);
            transition: all 0.3s ease;
        }

        .tab.active {
            background: var(--white);
            color: var(--primary-green);
            box-shadow: 0 2px 8px rgba(45,90,61,0.1);
        }

        .chart-container { height: 300px; margin-bottom: 20px; }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .summary-item {
            background: var(--light-green);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .summary-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-green);
        }

        .summary-label {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-top: 5px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .data-table th {
            background: var(--light-green);
            font-weight: 600;
            color: var(--primary-green);
        }

        .data-table tr:last-child td { border-bottom: none; }

        /* 骑行记录列表 */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--primary-green);
            display: flex;
            align-items: center;
        }

        .section-title i { margin-right: 8px; }

        .add-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-btn:hover { box-shadow: 0 4px 15px rgba(45,90,61,0.3); }

        .ride-record-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: var(--light-green);
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .ride-record-item:hover {
            background: var(--mint-green);
            transform: translateX(4px);
        }

        .record-date {
            font-weight: 600;
            color: var(--primary-green);
            min-width: 100px;
            font-size: 0.9rem;
        }

        .record-info {
            flex: 1;
            min-width: 0;
        }

        .record-distance {
            font-weight: 700;
            color: var(--primary-green);
            font-size: 1.1rem;
            margin-right: 12px;
        }

        .record-speed {
            color: var(--text-gray);
            font-size: 0.85rem;
        }

        .record-note {
            color: var(--text-gray);
            font-size: 0.8rem;
            margin-top: 3px;
        }

        .record-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .record-action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .record-action-btn.edit {
            background: rgba(74,124,89,0.15);
            color: var(--secondary-green);
        }

        .record-action-btn.edit:hover {
            background: var(--secondary-green);
            color: white;
        }

        .record-action-btn.delete {
            background: rgba(244,67,54,0.12);
            color: #f44336;
        }

        .record-action-btn.delete:hover {
            background: #f44336;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-gray);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--white);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--light-green);
            color: var(--text-gray);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: #f44336;
            color: white;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-dark);
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--secondary-green);
            background: var(--white);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.cancel {
            background: var(--light-green);
            color: var(--text-gray);
        }

        .modal-btn.cancel:hover { background: #d5e8da; }

        .modal-btn.confirm {
            background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
            color: white;
        }

        .modal-btn.confirm:hover { box-shadow: 0 4px 15px rgba(45,90,61,0.3); }

        .modal-btn.danger {
            background: #f44336;
            color: white;
        }

        .modal-btn.danger:hover { background: #d32f2f; }

        /* 底部导航 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; background: var(--white);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(45,90,61,0.12);
            padding: 8px 15px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            z-index: 100;
            justify-content: space-around;
        }

        .nav-item {
            flex: 1; max-width: 90px;
            display: flex; flex-direction: column;
            align-items: center; padding: 10px 8px;
            border-radius: 14px; cursor: pointer;
            color: var(--text-gray); transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            position: relative;
        }

        .nav-item:hover {
            background: rgba(74,124,89,0.08);
            color: var(--secondary-green);
            transform: translateY(-2px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(45,90,61,0.15), rgba(74,124,89,0.1));
            color: var(--primary-green);
            box-shadow: 0 4px 12px rgba(45,90,61,0.15);
        }

        .nav-item.active::before {
            content: ''; position: absolute; top: -4px;
            width: 6px; height: 6px; background: var(--primary-green);
            border-radius: 50%; animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(45,90,61,0.4); }
            50% { box-shadow: 0 0 0 6px rgba(45,90,61,0); }
        }

        .nav-item i { font-size: 1.4rem; margin-bottom: 5px; transition: transform 0.3s ease; }
        .nav-item:hover i, .nav-item.active i { transform: scale(1.1); }
        .nav-item span { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.3px; }

        @media (min-width:768px) { body { max-width:700px; margin:0 auto; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
            <span>返回</span>
        </div>
        <div class="header-title">骑行统计</div>
        <div style="width:80px;"></div>
    </div>

    <!-- 图表卡片 -->
    <div class="card">
        <div class="tabs">
            <div class="tab active" onclick="changePeriod('day')">日</div>
            <div class="tab" onclick="changePeriod('month')">月</div>
            <div class="tab" onclick="changePeriod('year')">年</div>
        </div>

        <div class="chart-container" id="chart"></div>

        <div class="stats-summary">
            <div class="summary-item">
                <div class="summary-value" id="total-distance">0</div>
                <div class="summary-label">总里程(km)</div>
            </div>
            <div class="summary-item">
                <div class="summary-value" id="ride-count">0</div>
                <div class="summary-label">骑行次数</div>
            </div>
            <div class="summary-item">
                <div class="summary-value" id="avg-distance">0</div>
                <div class="summary-label">平均里程(km)</div>
            </div>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>里程(km)</th>
                </tr>
            </thead>
            <tbody id="data-body"></tbody>
        </table>
    </div>

    <!-- 骑行记录管理 -->
    <div class="card">
        <div class="section-header">
            <h2 class="section-title">
                <i class="fas fa-history"></i>
                骑行记录
            </h2>
            <button class="add-btn" onclick="openAddModal()">
                <i class="fas fa-plus"></i>
                <span>添加记录</span>
            </button>
        </div>
        <div id="ride-records-list">
            <div class="empty-state">加载中...</div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
      <div class="nav-item" onclick="goBack()">
        <i class="fa-solid fa-bicycle"></i>
        <span>骑行</span>
      </div>
      <div class="nav-item active">
        <i class="fa-solid fa-user"></i>
        <span>我</span>
      </div>
    </div>

    <!-- 添加/编辑模态框 -->
    <div class="modal-overlay" id="add-edit-modal" onclick="closeModal('add-edit-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">添加骑行记录</h3>
                <button class="modal-close" onclick="closeModal('add-edit-modal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <input type="hidden" id="record-id">
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="record-date" required>
            </div>
            <div class="form-group">
                <label>里程 (km)</label>
                <input type="number" id="record-distance" step="0.1" placeholder="0.0" required>
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="record-note" placeholder="添加备注..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal('add-edit-modal')">取消</button>
                <button class="modal-btn confirm" onclick="saveRecord()">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal-overlay" id="delete-confirm-modal" onclick="closeModal('delete-confirm-modal')">
        <div class="modal" style="text-align:center;" onclick="event.stopPropagation()">
            <div style="font-size:2rem;margin-bottom:10px;color:#f44336;">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3 class="modal-title">确认删除</h3>
            <p style="color:var(--text-gray);margin:10px 0 20px;">确定要删除 <strong id="delete-record-info"></strong> 吗？此操作不可撤销。</p>
            <input type="hidden" id="delete-record-id">
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal('delete-confirm-modal')">取消</button>
                <button class="modal-btn danger" onclick="deleteRecord()">删除</button>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        let chart;
        let currentPeriod = 'day';
        let rideRecords = [];

        function goBack() { window.location.href = '/'; }
        function goToEquipment() { window.location.href = '/equipment'; }

        // ===== 图表逻辑 =====
        function changePeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (period === 'day' && i === 0) || (period === 'month' && i === 1) || (period === 'year' && i === 2));
            });
            loadChartData();
        }

        function loadChartData() {
            fetch(`/api/ride_stats/${currentPeriod}`)
                .then(res => res.json())
                .then(data => {
                    const labels = data.labels.slice().reverse();
                    const values = data.values.slice().reverse();
                    renderChart(labels, values);
                    renderTable(labels, values);
                    updateSummary(data.values);
                });
        }

        function renderChart(labels, values) {
            if (!chart) {
                chart = echarts.init(document.getElementById('chart'));
            }
            chart.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: labels },
                yAxis: { type: 'value' },
                series: [{
                    name: '骑行里程',
                    type: 'line',
                    data: values,
                    smooth: true,
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(45,90,61,0.3)' },
                            { offset: 1, color: 'rgba(45,90,61,0.05)' }
                        ])
                    },
                    lineStyle: { color: '#2d5a3d', width: 3 },
                    itemStyle: { color: '#2d5a3d' }
                }]
            });
        }

        function renderTable(labels, values) {
            const tbody = document.getElementById('data-body');
            tbody.innerHTML = labels.map((label, i) => `
                <tr>
                    <td>${escapeHtml(String(label))}</td>
                    <td>${values[i]} km</td>
                </tr>
            `).join('');
        }

        function updateSummary(values) {
            const total = values.reduce((a, b) => a + b, 0);
            const count = values.filter(v => v > 0).length;
            const avg = count > 0 ? (total / count).toFixed(1) : 0;
            document.getElementById('total-distance').textContent = total.toFixed(1);
            document.getElementById('ride-count').textContent = count;
            document.getElementById('avg-distance').textContent = avg;
        }

        // ===== 骑行记录 CRUD =====
        function loadRideRecords() {
            fetch('/api/ride_records')
                .then(res => res.json())
                .then(data => {
                    rideRecords = data;
                    renderRideRecords();
                })
                .catch(() => {
                    document.getElementById('ride-records-list').innerHTML = '<div class="empty-state">加载失败</div>';
                });
        }

        function renderRideRecords() {
            const list = document.getElementById('ride-records-list');
            if (rideRecords.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无骑行记录，点击上方按钮添加</div>';
                return;
            }
            list.innerHTML = rideRecords.map(record => `
                <div class="ride-record-item">
                    <div class="record-date">${escapeHtml(record.date)}</div>
                    <div class="record-info">
                        <div>
                            <span class="record-distance">${record.distance} km</span>
                        </div>
                        ${record.note ? `<div class="record-note">${escapeHtml(record.note)}</div>` : ''}
                    </div>
                    <div class="record-actions">
                        <button class="record-action-btn edit" onclick="openEditModal(${record.id})" title="编辑">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="record-action-btn delete" onclick="openDeleteConfirm(${record.id})" title="删除">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openAddModal() {
            document.getElementById('modal-title').textContent = '添加骑行记录';
            document.getElementById('record-id').value = '';
            document.getElementById('record-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('record-distance').value = '';
            document.getElementById('record-note').value = '';
            document.getElementById('add-edit-modal').classList.add('show');
        }

        function openEditModal(id) {
            const record = rideRecords.find(r => r.id === id);
            if (!record) return;
            document.getElementById('modal-title').textContent = '编辑骑行记录';
            document.getElementById('record-id').value = record.id;
            document.getElementById('record-date').value = record.date;
            document.getElementById('record-distance').value = record.distance;
            document.getElementById('record-note').value = record.note || '';
            document.getElementById('add-edit-modal').classList.add('show');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function saveRecord() {
            const id = document.getElementById('record-id').value;
            const date = document.getElementById('record-date').value;
            const distance = parseFloat(document.getElementById('record-distance').value);
            const note = document.getElementById('record-note').value;

            if (!date || isNaN(distance)) {
                showToast('请填写完整信息');
                return;
            }

            const payload = { date, distance, avgSpeed: 0, note };
            const url = id ? `/api/ride_record/${id}` : '/api/ride_record';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                credentials: 'include'
            })
            .then(res => res.json())
            .then(() => {
                showToast(id ? '修改成功' : '添加成功');
                closeModal('add-edit-modal');
                loadRideRecords();
                loadChartData();
            })
            .catch(() => showToast('操作失败'));
        }

        function openDeleteConfirm(id) {
            const record = rideRecords.find(r => r.id === id);
            if (!record) return;
            document.getElementById('delete-record-id').value = id;
            document.getElementById('delete-record-info').textContent = `${record.date} - ${record.distance} km`;
            document.getElementById('delete-confirm-modal').classList.add('show');
        }

        function deleteRecord() {
            const id = document.getElementById('delete-record-id').value;
            fetch(`/api/ride_record/${id}`, { method: 'DELETE', credentials: 'include' })
            .then(res => res.json())
            .then(() => {
                showToast('删除成功');
                closeModal('delete-confirm-modal');
                loadRideRecords();
                loadChartData();
            })
            .catch(() => showToast('删除失败'));
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
                background: rgba(45,90,61,0.9); color: white;
                padding: 12px 24px; border-radius: 10px;
                font-weight: 600; z-index: 2000;
                opacity: 0; transition: opacity 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '1', 10);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => document.body.removeChild(toast), 300);
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadChartData();
            loadRideRecords();
        });
